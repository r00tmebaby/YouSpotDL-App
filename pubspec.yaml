name: youspotdl
description: "YouSpotDL - Spotify & YouTube Playlist Downloader"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  just_audio: ^0.9.42
  desktop_drop: ^0.5.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  file_picker: ^8.1.7
  go_router: ^14.6.3
  window_manager: ^0.5.1
  path_provider: ^2.1.5
  http: ^1.2.2
  uuid: ^4.5.1
  intl: ^0.19.0
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
